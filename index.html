<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VAKDAB • твій аніме каталог</title>
    <link rel="preconnect" href="https://monoanime.animegran8.workers.dev" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <meta property="og:title" content="VAKDAB - твій аніме каталог" />
    <meta property="og:description" content="Сучасна платформа для перегляду аніме" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/leftdock.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/ui.css">
</head>
<body class="appletv-agnative-topnav">
    <div class="app-container">

        <!-- ХЕДЕР -->
        <div class="header">
            <div class="header-left">
                <button class="burger-btn" id="burgerBtn" aria-label="Відкрити меню" title="Меню (M)">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="logo" id="logoHome" title="На головну">
                    <div class="logo-text">
                        <div class="logo-title-row">
                            <h1>VAKDAB</h1>
                            <div class="logo-icon">⎈</div>
                        </div>
                        <span>чорно-білий каталог</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="search-wrapper" id="searchWrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Пошук аніме..." autocomplete="off" />
                    <span class="search-shortcut">/</span>
                    <button class="search-clear" id="searchClearBtn" aria-label="Очистити"><i class="fas fa-times-circle"></i></button>
                </div>
                <button id="themeToggleBtn" class="btn-icon" title="Змінити тему (T)">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            <div class="agnative-topnav-clock" id="agnativeTopnavClock">00:00</div>
        </div>

        <!-- LEFTDOCK -->
        <div class="leftdock-overlay" id="leftdockOverlay"></div>
        <aside class="agnative-leftdock" id="leftdock" aria-label="Головне меню">
            <div class="agnative-leftdock__inner" id="leftdockInner"></div>
        </aside>

        <!-- HERO BANNER -->
        <div class="agnative-hero agnative-hero--visible" id="heroBanner" style="display:none;">
            <img class="agnative-hero__bg" alt="" />
            <div class="agnative-hero__content">
                <img class="agnative-hero__logo" alt="" />
                <div class="agnative-hero__title"></div>
                <div class="agnative-hero__year"></div>
                <div class="agnative-hero__overview"></div>
            </div>
            <div class="agnative-hero__play selector" tabindex="0" data-selector="true" title="Дивитися"></div>
            <div class="agnative-hero__indicators"></div>
        </div>

        <!-- КНОПКИ ДІЙ -->
        <div class="actions-row" id="actionsRow">
            <button class="action-pill" id="top100Btn" title="ТОП 100 аніме"><i class="fas fa-crown"></i> ТОП 100</button>
            <button class="action-pill" id="randomBtn" title="Випадкове аніме (R)"><i class="fas fa-dice-d6"></i> Випадкове</button>
        </div>

        <!-- СІТКА -->
        <div id="animeContainer" class="anime-grid">
            <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження аніме...</div>
        </div>
        <div class="pagination-row" id="paginationRow"></div>

        <footer><span>VAKDAB &copy; 2026 — Усі права захищено • Клавіші: / пошук, M меню, T тема, R випадкове</span></footer>
    </div>

    <!-- КНОПКА НАГОРУ -->
    <button class="back-to-top" id="backToTopBtn" title="Нагору" aria-label="Прокрутити нагору">
        <i class="fas fa-chevron-up"></i>
    </button>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- МОДАЛКА ДЕТАЛЕЙ -->
    <div id="animeModal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <button class="back-button" id="closeModalBtn" title="Назад"><i class="fas fa-chevron-left"></i></button>
                <h2 id="modalTitle">...</h2>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- МОДАЛКА ПЛЕЄРА -->
    <div id="playerModal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content" style="max-width:900px;">
            <div class="modal-header"><h2>Плеєр</h2><button class="close-modal" id="closePlayerBtn" title="Закрити (Esc)">&times;</button></div>
            <div class="modal-body">
                <div class="player-wrapper" id="lampaPlayerWrapper"></div>
                <div id="playerLoading" class="loader" style="display:none;"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА СЕКЦІЙ -->
    <div id="sectionModal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <button class="back-button" id="closeSectionModalBtn" title="Назад"><i class="fas fa-chevron-left"></i></button>
                <h2 id="sectionModalTitle">...</h2>
            </div>
            <div class="modal-body" id="sectionModalBody"></div>
        </div>
    </div>

    <!-- JS головний модуль -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
